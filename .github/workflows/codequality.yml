name: Code Quality

on:
  schedule:
    - cron: "15 7 * * 1"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    permissions:
      contents: read
      actions: read
      security-events: write
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Code Quality
    runs-on: windows-latest
    env:
      SONAR_CACHE_DIR: ${{ github.workspace }}\.sonar\cache
      SONAR_SCANNER_DIR: ${{ github.workspace }}\.sonar\scanner
      SONAR_PROJECT_KEY: frasermolyneux_demo-manager
      SONAR_ORGANIZATION: frasermolyneux
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarCloud packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        with:
          path: ${{ env.SONAR_CACHE_DIR }}
          key: ${{ runner.os }}-sonar-cache

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        with:
          path: ${{ env.SONAR_SCANNER_DIR }}
          key: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.SONAR_SCANNER_DIR }}" | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path "${{ env.SONAR_SCANNER_DIR }}"

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: csharp

      - name: Begin SonarCloud analysis
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          Set-Location "${{ github.workspace }}\src"
          & "${{ env.SONAR_SCANNER_DIR }}\dotnet-sonarscanner" begin /k:"${{ env.SONAR_PROJECT_KEY }}" /o:"${{ env.SONAR_ORGANIZATION }}" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="${{ env.SONAR_HOST_URL }}"

      - name: Restore NuGet packages
        shell: pwsh
        run: |
          Set-Location "${{ github.workspace }}\src"
          nuget restore "DemoManager.sln"

      - name: Build solution
        shell: pwsh
        run: |
          Set-Location "${{ github.workspace }}\src"
          msbuild "DemoManager.sln" /p:Configuration=Release /p:Platform="Any CPU"

      - name: End SonarCloud analysis
        if: ${{ always() }}
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          Set-Location "${{ github.workspace }}\src"
          & "${{ env.SONAR_SCANNER_DIR }}\dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          category: /language:csharp

  devops-secure-scanning:
    permissions:
      contents: read
      actions: read
      id-token: write
      security-events: write
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: frasermolyneux/actions/.github/workflows/devops-secure-scanning.yml@main

  dependency-review:
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          comment-summary-in-pr: always

